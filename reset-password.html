<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:400px">

<h3 class="text-center mb-4">Reset Password</h3>

<form>

<div class="mb-3">
<label class="form-label">New Password</label>
<input type="password" class="form-control" id="newPassword">
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" id="confirmPassword">
</div>

<!-- Show Password Toggle -->
<div class="form-check mb-3">
  <input class="form-check-input" type="checkbox" onclick="togglePassword()">
  <label class="form-check-label">Show Password</label>
</div>

<a href="index.html">
<button type="button" class="btn btn-warning w-100">Update Password</button>
</a>

</form>

</div>
</div>

<script>
function togglePassword() {
  let p1 = document.getElementById("newPassword");
  let p2 = document.getElementById("confirmPassword");

  if (p1.type === "password") {
    p1.type = "text";
    p2.type = "text";
  } else {
    p1.type = "password";
    p2.type = "password";
  }
}
</script>

</body>
</html>
